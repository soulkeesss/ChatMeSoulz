<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulChat — Real-time Messenger</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base: #0a0e17;
      --bg-panel: #111827;
      --bg-card: #1a2235;
      --bg-input: #1e2d42;
      --bg-msg-out: #005c4b;
      --bg-msg-in: #1e2d42;
      --accent: #25d366;
      --accent-dim: #128c5e;
      --accent-glow: rgba(37,211,102,0.18);
      --text-primary: #e8edf5;
      --text-secondary: #8a9bb5;
      --text-muted: #4a5a72;
      --border: rgba(255,255,255,0.07);
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
      --radius: 14px;
      --radius-sm: 8px;
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── LOGIN ─────────────────────────────────────── */
    #loginScreen {
      position: fixed; inset: 0;
      background: var(--bg-base);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      animation: fadeIn 0.5s ease;
    }
    #loginScreen.hidden { display: none; }

    .login-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: min(420px, 92vw);
      box-shadow: var(--shadow), 0 0 60px rgba(37,211,102,0.06);
      text-align: center;
    }

    .login-logo {
      width: 72px; height: 72px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
      box-shadow: 0 0 30px rgba(37,211,102,0.4);
    }

    .login-card h1 {
      font-size: 28px; font-weight: 700; margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .login-card p {
      color: var(--text-secondary); font-size: 14px; margin-bottom: 32px;
    }

    .input-group { margin-bottom: 16px; text-align: left; }
    .input-group label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-secondary); margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .input-group input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      color: var(--text-primary);
      font-family: inherit; font-size: 15px;
      outline: none; transition: var(--transition);
    }
    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .input-group input::placeholder { color: var(--text-muted); }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none; border-radius: var(--radius-sm);
      padding: 14px;
      font-family: inherit; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: var(--transition);
      margin-top: 8px;
    }
    .btn-primary:hover {
      background: #2fe87a;
      box-shadow: 0 4px 20px rgba(37,211,102,0.4);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0); }

    /* ─── MAIN APP ───────────────────────────────────── */
    #app {
      display: none;
      width: 100vw; height: 100dvh;
      grid-template-columns: 320px 1fr;
      grid-template-rows: 1fr;
    }
    #app.visible { display: grid; }

    /* ─── SIDEBAR ────────────────────────────────────── */
    .sidebar {
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }

    .my-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px; color: #000;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    .my-info { flex: 1; min-width: 0; }
    .my-info .name {
      font-weight: 600; font-size: 15px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .my-info .status {
      font-size: 12px; color: var(--accent);
      display: flex; align-items: center; gap: 5px;
      margin-top: 2px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-tab {
      flex: 1; padding: 12px;
      background: none; border: none;
      color: var(--text-secondary);
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: var(--transition);
      border-bottom: 2px solid transparent;
    }
    .sidebar-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .sidebar-section { flex: 1; overflow-y: auto; }
    .sidebar-section::-webkit-scrollbar { width: 4px; }
    .sidebar-section::-webkit-scrollbar-track { background: transparent; }
    .sidebar-section::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }

    .section-title {
      padding: 16px 20px 8px;
      font-size: 11px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.1em;
    }

    /* Users table */
    .users-table {
      margin: 0 12px 16px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .users-table-header {
      display: grid;
      grid-template-columns: 1fr auto auto;
      padding: 10px 14px;
      font-size: 11px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
    }
    .user-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      transition: var(--transition);
      animation: slideIn 0.3s ease;
    }
    .user-row:last-child { border-bottom: none; }
    .user-row:hover { background: rgba(255,255,255,0.03); }

    .user-row-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .user-mini-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: #000;
      flex-shrink: 0;
    }
    .user-row-name {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-row-name.me-tag::after {
      content: ' (you)';
      color: var(--text-muted); font-size: 11px;
    }
    .online-badge {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--accent); font-weight: 600;
    }
    .online-badge::before {
      content: ''; width: 6px; height: 6px;
      border-radius: 50%; background: var(--accent);
    }

    /* ─── CHAT AREA ──────────────────────────────────── */
    .chat-area {
      display: flex; flex-direction: column;
      background: var(--bg-base);
      position: relative;
      overflow: hidden;
    }

    .chat-bg {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(37,211,102,0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(37,211,102,0.02) 0%, transparent 40%);
      pointer-events: none;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
      background: var(--bg-panel);
      z-index: 10;
      flex-shrink: 0;
    }

    .chat-header-icon {
      width: 42px; height: 42px;
      border-radius: 50%; background: var(--accent-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .chat-header-info { flex: 1; }
    .chat-header-name {
      font-weight: 700; font-size: 16px;
    }
    .chat-header-sub {
      font-size: 12px; color: var(--text-secondary); margin-top: 1px;
    }
    #onlineCount {
      font-size: 12px; color: var(--accent); font-weight: 600;
    }

    /* Messages */
    .messages-container {
      flex: 1; overflow-y: auto;
      padding: 24px 24px 12px;
      display: flex; flex-direction: column; gap: 4px;
      position: relative; z-index: 1;
    }
    .messages-container::-webkit-scrollbar { width: 4px; }
    .messages-container::-webkit-scrollbar-track { background: transparent; }
    .messages-container::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }

    .day-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 16px 0;
    }
    .day-divider::before, .day-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .day-divider span {
      font-size: 11px; color: var(--text-muted);
      background: var(--bg-card); padding: 4px 12px;
      border-radius: 20px; border: 1px solid var(--border);
    }

    .msg-wrapper {
      display: flex; gap: 8px;
      max-width: 70%;
      animation: msgIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .msg-wrapper.outgoing {
      align-self: flex-end; flex-direction: row-reverse;
    }
    .msg-wrapper.incoming { align-self: flex-start; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #000;
      flex-shrink: 0; align-self: flex-end;
    }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 100%;
      word-break: break-word;
      position: relative;
    }
    .outgoing .msg-bubble {
      background: var(--bg-msg-out);
      border-bottom-right-radius: 4px;
    }
    .incoming .msg-bubble {
      background: var(--bg-msg-in);
      border-bottom-left-radius: 4px;
    }

    .msg-sender {
      font-size: 11px; font-weight: 700;
      color: var(--accent); margin-bottom: 4px;
    }
    .msg-text { font-size: 14px; line-height: 1.5; }
    .msg-meta {
      font-size: 11px; color: var(--text-muted);
      text-align: right; margin-top: 4px;
      display: flex; align-items: center; justify-content: flex-end; gap: 4px;
    }
    .msg-check { color: var(--accent); font-size: 13px; }

    /* File message */
    .msg-file {
      display: flex; align-items: center; gap: 12px;
      background: rgba(0,0,0,0.2); border-radius: 10px;
      padding: 12px 14px; min-width: 220px;
      cursor: pointer; transition: var(--transition);
      text-decoration: none; color: inherit;
    }
    .msg-file:hover { background: rgba(0,0,0,0.35); }
    .msg-file-icon {
      width: 40px; height: 40px;
      background: rgba(37,211,102,0.2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .msg-file-info { min-width: 0; }
    .msg-file-name {
      font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 180px;
    }
    .msg-file-size { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

    /* Image message */
    .msg-image {
      max-width: 280px; max-height: 220px;
      border-radius: 10px; display: block;
      cursor: pointer; transition: var(--transition);
      object-fit: cover; width: 100%;
    }
    .msg-image:hover { opacity: 0.9; }

    /* System message */
    .msg-system {
      align-self: center; text-align: center;
      font-size: 12px; color: var(--text-muted);
      background: var(--bg-card);
      padding: 6px 16px; border-radius: 20px;
      border: 1px solid var(--border);
      margin: 8px 0;
      animation: fadeIn 0.3s ease;
    }

    /* ─── INPUT AREA ─────────────────────────────────── */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg-panel);
      position: relative; z-index: 10;
      flex-shrink: 0;
    }

    .drag-overlay {
      position: absolute; inset: 0;
      background: rgba(37,211,102,0.08);
      border: 2px dashed var(--accent);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px;
      z-index: 20;
      pointer-events: none; opacity: 0;
      transition: opacity 0.2s;
    }
    .drag-overlay.active { opacity: 1; }
    .drag-overlay span:first-child { font-size: 36px; }
    .drag-overlay span:last-child {
      font-size: 15px; font-weight: 600; color: var(--accent);
    }

    .file-preview-bar {
      display: none;
      align-items: center; gap: 10px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px; margin-bottom: 12px;
    }
    .file-preview-bar.visible { display: flex; }
    .file-preview-icon { font-size: 24px; }
    .file-preview-info { flex: 1; min-width: 0; }
    .file-preview-name {
      font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-preview-size { font-size: 11px; color: var(--text-secondary); }
    .file-preview-remove {
      width: 28px; height: 28px;
      background: rgba(255,50,50,0.15); border: none;
      border-radius: 50%; color: #ff5555;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }
    .file-preview-remove:hover { background: rgba(255,50,50,0.3); }

    .input-row {
      display: flex; align-items: flex-end; gap: 10px;
    }

    .attach-btn, .send-btn {
      width: 44px; height: 44px;
      border-radius: 50%; border: none;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .attach-btn {
      background: var(--bg-input);
      color: var(--text-secondary); font-size: 20px;
    }
    .attach-btn:hover { background: var(--bg-card); color: var(--text-primary); }

    .send-btn {
      background: var(--accent); color: #000; font-size: 20px;
    }
    .send-btn:hover {
      background: #2fe87a;
      box-shadow: 0 4px 16px rgba(37,211,102,0.4);
      transform: scale(1.05);
    }
    .send-btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }

    .text-input-wrap { flex: 1; position: relative; }
    #messageInput {
      width: 100%;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 22px; padding: 12px 18px;
      color: var(--text-primary); font-family: inherit; font-size: 14px;
      outline: none; resize: none;
      max-height: 120px; overflow-y: auto;
      line-height: 1.5;
      transition: var(--transition);
    }
    #messageInput:focus { border-color: rgba(37,211,102,0.4); }
    #messageInput::placeholder { color: var(--text-muted); }

    /* ─── IMAGE LIGHTBOX ─────────────────────────────── */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.9); z-index: 1000;
      align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

    /* ─── SCROLLBAR GLOBAL ───────────────────────────── */
    * { scrollbar-width: thin; scrollbar-color: var(--text-muted) transparent; }

    /* ─── ANIMATIONS ─────────────────────────────────── */
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
    @keyframes msgIn {
      from { opacity:0; transform: scale(0.9) translateY(6px) }
      to { opacity:1; transform: scale(1) translateY(0) }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1 }
      50% { opacity: 0.4 }
    }

    /* ─── LOADING ────────────────────────────────────── */
    .loading-indicator {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 32px;
      color: var(--text-secondary); font-size: 14px;
    }
    .loading-dots { display: flex; gap: 4px; }
    .loading-dots span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      animation: bounce 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0) } 30% { transform: translateY(-8px) } }

    /* ─── TOAST ──────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--bg-card); border: 1px solid var(--border);
      padding: 12px 24px; border-radius: 40px;
      font-size: 13px; color: var(--text-primary);
      box-shadow: var(--shadow); z-index: 999;
      transition: all 0.3s ease;
      opacity: 0; pointer-events: none;
    }
    #toast.show { opacity: 1; }

    /* ─── SETUP NOTICE ───────────────────────────────── */
    .setup-notice {
      background: rgba(255,170,0,0.1); border: 1px solid rgba(255,170,0,0.3);
      border-radius: var(--radius-sm); padding: 12px 16px;
      font-size: 13px; color: #ffaa00; margin-bottom: 16px;
      line-height: 1.6;
    }
    .setup-notice a { color: #ffaa00; }

    /* ─── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 680px) {
      #app.visible {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      .sidebar {
        display: none;
        max-height: 220px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .sidebar.open { display: flex; }
      .msg-wrapper { max-width: 88%; }
      .chat-header-icon { cursor: pointer; }
    }
  </style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">💬</div>
    <h1>SoulChat</h1>
    <p>Real-time messenger — masuk dulu dengan nama kamu</p>

    <!-- Pesan peringatan setup Firebase — hapus ini setelah konfigurasi -->
    <div class="setup-notice" id="setupNotice">
      ⚠️ <strong>Setup diperlukan:</strong> Ganti Firebase config di bawah sebelum deploy.
      <a href="https://console.firebase.google.com" target="_blank">Buat project Firebase →</a>
    </div>

    <div class="input-group">
      <label>Nama kamu</label>
      <input type="text" id="nameInput" placeholder="Masukkan nama..." maxlength="30" autocomplete="off" />
    </div>
    <button class="btn-primary" id="loginBtn" onclick="handleLogin()">Masuk ke Chat ✓</button>
  </div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="my-avatar" id="myAvatar">?</div>
      <div class="my-info">
        <div class="name" id="myName">–</div>
        <div class="status"><span class="status-dot"></span> Online</div>
      </div>
    </div>

    <div class="sidebar-tabs">
      <button class="sidebar-tab active">👥 Online</button>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Pengguna Aktif</div>
      <div class="users-table">
        <div class="users-table-header">
          <span>Nama</span>
          <span>Status</span>
        </div>
        <div id="usersList">
          <div class="loading-indicator">
            <div class="loading-dots"><span></span><span></span><span></span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area">
    <div class="chat-bg"></div>

    <div class="chat-header">
      <div class="chat-header-icon" onclick="toggleSidebar()">🌐</div>
      <div class="chat-header-info">
        <div class="chat-header-name">Global Chat</div>
        <div class="chat-header-sub"><span id="onlineCount">0 online</span></div>
      </div>
    </div>

    <div class="messages-container" id="messagesContainer">
      <div class="loading-indicator">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        Memuat pesan...
      </div>
    </div>

    <div class="input-area" id="inputArea">
      <div class="drag-overlay" id="dragOverlay">
        <span>📎</span>
        <span>Lepas file di sini</span>
      </div>

      <div class="file-preview-bar" id="filePreviewBar">
        <div class="file-preview-icon" id="previewIcon">📄</div>
        <div class="file-preview-info">
          <div class="file-preview-name" id="previewName">–</div>
          <div class="file-preview-size" id="previewSize">–</div>
        </div>
        <button class="file-preview-remove" onclick="clearFile()">✕</button>
      </div>

      <div class="input-row">
        <label class="attach-btn" title="Lampirkan file">
          📎
          <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(this.files[0])" />
        </label>
        <div class="text-input-wrap">
          <textarea id="messageInput" placeholder="Ketik pesan..." rows="1"
            onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightboxImg" src="" alt="" />
</div>

<div id="toast"></div>

<!-- ═══ FIREBASE SDK ═══ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit,
           serverTimestamp, doc, setDoc, deleteDoc, getDocs, where
         } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytesResumable, getDownloadURL
         } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  // ╔══════════════════════════════════════════════════╗
  // ║  GANTI CONFIG INI DENGAN FIREBASE PROJECT KAMU  ║
  // ║  https://console.firebase.google.com            ║
  // ╚══════════════════════════════════════════════════╝
const firebaseConfig = {
  apiKey: "AIzaSyDum5Uo6rXIQ89uf85iCypYImW_2qYfUDY",
  authDomain: "chatappsoulz.firebaseapp.com",
  projectId: "chatappsoulz",
  storageBucket: "chatappsoulz.firebasestorage.app",
  messagingSenderId: "226739738147",
  appId: "1:226739738147:web:ddfa5d5baaef2e9e6dc396",
  measurementId: "G-JHL4VZN154"
};

  // Deteksi apakah config sudah diisi
  const isConfigured = !firebaseConfig.apiKey.includes("GANTI");

  let app, db, storage;
  if (isConfigured) {
    try {
      app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      storage = getStorage(app);
      document.getElementById('setupNotice').style.display = 'none';
    } catch(e) {
      console.error("Firebase init error:", e);
    }
  }

  // ── State ──────────────────────────────────────────
  let myName = '';
  let myId = '';
  let myColor = '';
  let pendingFile = null;
  let unsubMessages = null;
  let unsubUsers = null;
  let heartbeatInterval = null;

  const COLORS = [
    '#25d366','#00b4d8','#f77f00','#e040fb',
    '#ff6b6b','#4cc9f0','#06d6a0','#ffd166'
  ];

  function randomColor() {
    return COLORS[Math.floor(Math.random() * COLORS.length)];
  }

  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
  }

  function getInitial(name) {
    return name ? name[0].toUpperCase() : '?';
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  }

  function formatFileSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function fileIcon(type, name) {
    if (!type && name) {
      const ext = name.split('.').pop().toLowerCase();
      if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return '🖼️';
      if (['mp4','mov','avi','webm'].includes(ext)) return '🎬';
      if (['mp3','wav','ogg'].includes(ext)) return '🎵';
      if (['pdf'].includes(ext)) return '📕';
      if (['zip','rar','7z'].includes(ext)) return '🗜️';
      if (['doc','docx'].includes(ext)) return '📝';
      if (['xls','xlsx'].includes(ext)) return '📊';
      return '📄';
    }
    if (type?.startsWith('image/')) return '🖼️';
    if (type?.startsWith('video/')) return '🎬';
    if (type?.startsWith('audio/')) return '🎵';
    if (type === 'application/pdf') return '📕';
    if (type?.includes('zip') || type?.includes('rar')) return '🗜️';
    if (type?.includes('word')) return '📝';
    if (type?.includes('sheet') || type?.includes('excel')) return '📊';
    return '📄';
  }

  function showToast(msg, duration = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  // ── Login ──────────────────────────────────────────
  window.handleLogin = async function() {
    const input = document.getElementById('nameInput');
    const name = input.value.trim();
    if (!name) { input.focus(); showToast('Masukkan nama dulu!'); return; }
    if (name.length < 2) { showToast('Nama minimal 2 karakter'); return; }

    myName = name;
    myId = generateId();
    myColor = randomColor();

    document.getElementById('myName').textContent = myName;
    document.getElementById('myAvatar').textContent = getInitial(myName);
    document.getElementById('myAvatar').style.background = myColor;

    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');

    if (!isConfigured) {
      // Demo mode tanpa Firebase
      startDemoMode();
      return;
    }

    await registerUser();
    startListening();
    startHeartbeat();
    sendSystemMessage(`${myName} bergabung ke chat`);
  };

  // Enter key on login
  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  // ── User Presence ──────────────────────────────────
  async function registerUser() {
    if (!db) return;
    await setDoc(doc(db, 'users', myId), {
      name: myName,
      color: myColor,
      joinedAt: serverTimestamp(),
      lastSeen: serverTimestamp(),
      online: true
    });
  }

  async function removeUser() {
    if (!db || !myId) return;
    await deleteDoc(doc(db, 'users', myId));
  }

  function startHeartbeat() {
    if (!db) return;
    heartbeatInterval = setInterval(async () => {
      await setDoc(doc(db, 'users', myId), {
        name: myName, color: myColor,
        lastSeen: serverTimestamp(), online: true
      }, { merge: true });
    }, 20000);
  }

  // ── Real-time Listeners ────────────────────────────
  function startListening() {
    if (!db) return;

    // Messages
    const msgQ = query(collection(db, 'messages'), orderBy('timestamp', 'asc'), limit(200));
    let firstLoad = true;
    unsubMessages = onSnapshot(msgQ, snap => {
      if (firstLoad) {
        document.getElementById('messagesContainer').innerHTML = '';
        firstLoad = false;
      }
      snap.docChanges().forEach(change => {
        if (change.type === 'added') {
          renderMessage(change.doc.data(), change.doc.id);
        }
      });
      scrollToBottom();
    });

    // Users
    unsubUsers = onSnapshot(collection(db, 'users'), snap => {
      const users = [];
      snap.forEach(d => users.push({ id: d.id, ...d.data() }));
      renderUsers(users);
    });
  }

  // ── Render Messages ────────────────────────────────
  function renderMessage(data, id) {
    const container = document.getElementById('messagesContainer');

    // System message
    if (data.type === 'system') {
      const el = document.createElement('div');
      el.className = 'msg-system';
      el.textContent = data.text;
      container.appendChild(el);
      return;
    }

    const isMe = data.senderId === myId;
    const wrapper = document.createElement('div');
    wrapper.className = `msg-wrapper ${isMe ? 'outgoing' : 'incoming'}`;
    wrapper.dataset.id = id;

    const avatarEl = document.createElement('div');
    avatarEl.className = 'msg-avatar';
    avatarEl.style.background = data.senderColor || '#888';
    avatarEl.textContent = getInitial(data.sender);

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    let content = '';
    if (!isMe) {
      content += `<div class="msg-sender" style="color:${data.senderColor}">${escapeHtml(data.sender)}</div>`;
    }

    if (data.type === 'image') {
      content += `<img class="msg-image" src="${data.fileUrl}" alt="${escapeHtml(data.fileName)}"
        onclick="openLightbox('${data.fileUrl}')" loading="lazy" />`;
    } else if (data.type === 'file') {
      content += `
        <a class="msg-file" href="${data.fileUrl}" target="_blank" download="${escapeHtml(data.fileName)}">
          <div class="msg-file-icon">${fileIcon(data.fileType, data.fileName)}</div>
          <div class="msg-file-info">
            <div class="msg-file-name">${escapeHtml(data.fileName)}</div>
            <div class="msg-file-size">${data.fileSize ? formatFileSize(data.fileSize) : 'File'} • Klik untuk unduh</div>
          </div>
        </a>`;
    } else {
      content += `<div class="msg-text">${escapeHtml(data.text || '').replace(/\n/g,'<br>')}</div>`;
    }

    content += `<div class="msg-meta">
      ${formatTime(data.timestamp)}
      ${isMe ? '<span class="msg-check">✓✓</span>' : ''}
    </div>`;

    bubble.innerHTML = content;
    wrapper.appendChild(avatarEl);
    wrapper.appendChild(bubble);
    container.appendChild(wrapper);
  }

  // ── Render Users ───────────────────────────────────
  function renderUsers(users) {
    const list = document.getElementById('usersList');
    const count = document.getElementById('onlineCount');
    count.textContent = `${users.length} online`;

    if (users.length === 0) {
      list.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:13px">Belum ada pengguna</div>';
      return;
    }

    list.innerHTML = users.map(u => `
      <div class="user-row">
        <div class="user-row-info">
          <div class="user-mini-avatar" style="background:${u.color}">${getInitial(u.name)}</div>
          <span class="user-row-name ${u.id === myId ? 'me-tag' : ''}">${escapeHtml(u.name)}</span>
        </div>
        <div class="online-badge">Online</div>
      </div>
    `).join('');
  }

  // ── Send Message ───────────────────────────────────
  window.sendMessage = async function() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();

    if (!text && !pendingFile) return;

    if (!isConfigured) {
      // Demo mode
      demoSendMessage(text, pendingFile);
      input.value = '';
      input.style.height = 'auto';
      clearFile();
      return;
    }

    document.getElementById('sendBtn').disabled = true;

    try {
      if (pendingFile) {
        await uploadAndSend(pendingFile, text);
      } else {
        await addDoc(collection(db, 'messages'), {
          type: 'text', text,
          sender: myName, senderId: myId, senderColor: myColor,
          timestamp: serverTimestamp()
        });
      }
      input.value = '';
      input.style.height = 'auto';
      clearFile();
    } catch (e) {
      showToast('Gagal kirim: ' + e.message);
    }

    document.getElementById('sendBtn').disabled = false;
    input.focus();
  };

  async function uploadAndSend(file, caption) {
    if (!storage) return;
    const storageRef = ref(storage, `files/${Date.now()}_${file.name}`);
    const uploadTask = uploadBytesResumable(storageRef, file);

    showToast('Mengunggah file...');

    return new Promise((resolve, reject) => {
      uploadTask.on('state_changed', null,
        reject,
        async () => {
          const url = await getDownloadURL(uploadTask.snapshot.ref);
          const isImage = file.type.startsWith('image/');
          await addDoc(collection(db, 'messages'), {
            type: isImage ? 'image' : 'file',
            fileUrl: url,
            fileName: file.name,
            fileType: file.type,
            fileSize: file.size,
            text: caption || '',
            sender: myName, senderId: myId, senderColor: myColor,
            timestamp: serverTimestamp()
          });
          resolve();
        }
      );
    });
  }

  async function sendSystemMessage(text) {
    if (!db) return;
    await addDoc(collection(db, 'messages'), {
      type: 'system', text, timestamp: serverTimestamp()
    });
  }

  // ── File Handling ──────────────────────────────────
  window.handleFileSelect = function(file) {
    if (!file) return;
    pendingFile = file;
    document.getElementById('filePreviewBar').classList.add('visible');
    document.getElementById('previewIcon').textContent = fileIcon(file.type, file.name);
    document.getElementById('previewName').textContent = file.name;
    document.getElementById('previewSize').textContent = formatFileSize(file.size);
    document.getElementById('messageInput').focus();
  };

  window.clearFile = function() {
    pendingFile = null;
    document.getElementById('filePreviewBar').classList.remove('visible');
    document.getElementById('fileInput').value = '';
  };

  // Drag & drop
  const inputArea = document.getElementById('inputArea');
  const dragOverlay = document.getElementById('dragOverlay');
  let dragCounter = 0;

  document.addEventListener('dragenter', e => {
    if (e.dataTransfer?.types.includes('Files')) {
      dragCounter++;
      dragOverlay.classList.add('active');
    }
  });
  document.addEventListener('dragleave', () => {
    dragCounter--;
    if (dragCounter <= 0) { dragCounter = 0; dragOverlay.classList.remove('active'); }
  });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    dragCounter = 0;
    dragOverlay.classList.remove('active');
    const file = e.dataTransfer?.files[0];
    if (file) handleFileSelect(file);
  });

  // ── UI Helpers ─────────────────────────────────────
  window.handleKeyDown = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  };

  window.autoResize = function(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  };

  window.openLightbox = function(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.add('open');
  };

  window.toggleSidebar = function() {
    document.getElementById('sidebar').classList.toggle('open');
  };

  function scrollToBottom() {
    const c = document.getElementById('messagesContainer');
    c.scrollTop = c.scrollHeight;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  // ── Demo Mode (tanpa Firebase) ─────────────────────
  function startDemoMode() {
    showToast('⚠️ Mode demo – Firebase belum dikonfigurasi', 4000);
    document.getElementById('messagesContainer').innerHTML = '';
    document.getElementById('onlineCount').textContent = '1 online';
    renderUsers([{ id: myId, name: myName, color: myColor }]);

    // Welcome message
    const container = document.getElementById('messagesContainer');
    const el = document.createElement('div');
    el.className = 'msg-system';
    el.textContent = `${myName} bergabung ke chat (mode demo)`;
    container.appendChild(el);
  }

  function demoSendMessage(text, file) {
    const container = document.getElementById('messagesContainer');
    const wrapper = document.createElement('div');
    wrapper.className = 'msg-wrapper outgoing';

    const avatarEl = document.createElement('div');
    avatarEl.className = 'msg-avatar';
    avatarEl.style.background = myColor;
    avatarEl.textContent = getInitial(myName);

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    const now = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

    if (file && file.type.startsWith('image/')) {
      const url = URL.createObjectURL(file);
      bubble.innerHTML = `
        <img class="msg-image" src="${url}" alt="${escapeHtml(file.name)}" onclick="openLightbox('${url}')" />
        ${text ? `<div class="msg-text">${escapeHtml(text)}</div>` : ''}
        <div class="msg-meta">${now} <span class="msg-check">✓✓</span></div>
      `;
    } else if (file) {
      bubble.innerHTML = `
        <div class="msg-file">
          <div class="msg-file-icon">${fileIcon(file.type, file.name)}</div>
          <div class="msg-file-info">
            <div class="msg-file-name">${escapeHtml(file.name)}</div>
            <div class="msg-file-size">${formatFileSize(file.size)}</div>
          </div>
        </div>
        <div class="msg-meta">${now} <span class="msg-check">✓✓</span></div>
      `;
    } else {
      bubble.innerHTML = `
        <div class="msg-text">${escapeHtml(text).replace(/\n/g,'<br>')}</div>
        <div class="msg-meta">${now} <span class="msg-check">✓✓</span></div>
      `;
    }

    wrapper.appendChild(avatarEl);
    wrapper.appendChild(bubble);
    container.appendChild(wrapper);
    scrollToBottom();
  }

  // ── Cleanup on exit ────────────────────────────────
  window.addEventListener('beforeunload', () => {
    if (isConfigured && myId) {
      removeUser();
      if (unsubMessages) unsubMessages();
      if (unsubUsers) unsubUsers();
      if (heartbeatInterval) clearInterval(heartbeatInterval);
    }
  });
</script>
</body>
</html>
